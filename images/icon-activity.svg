<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Manul cat head with goggles — clean monochrome for VS Code activity bar -->
  <defs>
    <mask id="m">
      <rect width="24" height="24" fill="black"/>
      <!-- Ears with tufts -->
      <polygon points="3.5,9.5 5,2 7,4 9,9" fill="white"/>
      <polygon points="20.5,9.5 19,2 17,4 15,9" fill="white"/>
      <!-- Head — wide flat manul shape -->
      <ellipse cx="12" cy="14" rx="10" ry="8.5" fill="white"/>
      <!-- Fluffy cheek tufts -->
      <ellipse cx="4" cy="15.5" rx="3.8" ry="3" fill="white"/>
      <ellipse cx="20" cy="15.5" rx="3.8" ry="3" fill="white"/>

      <!-- Goggle band -->
      <rect x="2" y="10" width="20" height="2" rx="1" fill="black"/>
      <!-- Left goggle -->
      <circle cx="8" cy="13" r="4" fill="black"/>
      <circle cx="8" cy="13" r="3" fill="white"/>
      <circle cx="8" cy="13" r="1.8" fill="black"/>
      <!-- Right goggle -->
      <circle cx="16" cy="13" r="4" fill="black"/>
      <circle cx="16" cy="13" r="3" fill="white"/>
      <circle cx="16" cy="13" r="1.8" fill="black"/>
      <!-- Bridge between goggles -->
      <rect x="11" y="11.5" width="2" height="3" rx="0.5" fill="black"/>

      <!-- Nose -->
      <path d="M12,17.5 l-1,0.8 l2,0 z" fill="black"/>
      <!-- Mouth lines -->
      <line x1="11" y1="18.3" x2="9.5" y2="19" stroke="black" stroke-width="0.6" stroke-linecap="round"/>
      <line x1="13" y1="18.3" x2="14.5" y2="19" stroke="black" stroke-width="0.6" stroke-linecap="round"/>
    </mask>
  </defs>
  <rect width="24" height="24" fill="currentColor" mask="url(#m)"/>
</svg>